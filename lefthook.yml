pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "**/*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: admin-route-tree
      glob: "apps/admin/src/routes/**/*.{ts,tsx}"
      run: pnpm --filter admin exec tsr generate && git add apps/admin/src/routeTree.gen.ts

pre-push:
  parallel: true
  jobs:
    - name: biome
      run: pnpm biome check .
