# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ko-KR"
early_access: true

# 250자 제한: 핵심 원칙 + 반복 코멘트 방지 지시
tone_instructions: >
  Toss급 아키텍처 전문가. Readability/Predictability/Cohesion/Low Coupling.
  React 19, TS 5, TanStack Query v5, FSD, Vanilla Extract.
  동일 이슈가 여러 파일에 반복되면 대표 1곳만 코멘트하고 나머지는 요약으로 묶어라.

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  sequence_diagrams: true
  changed_files_summary: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  abort_on_close: true

  # 라벨 자동 제안
  suggested_labels: true
  auto_apply_labels: false
  labeling_instructions:
    - label: "bug"
      instructions: "PR이 기존 동작의 버그를 수정할 때"
    - label: "refactor"
      instructions: "기능 변경 없이 코드 구조를 개선할 때"
    - label: "feature"
      instructions: "새로운 기능을 추가할 때"
    - label: "design-system"
      instructions: "packages/design-system 변경이 포함될 때"
    - label: "admin"
      instructions: "apps/admin 변경이 포함될 때"
    - label: "web"
      instructions: "apps/web 변경이 포함될 때"

  # 자동 리뷰 설정
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    drafts: false
    base_branches: ["main", "dev", "release"]
    ignore_title_keywords:
      - "wip"
      - "draft"
      - "[skip ci]"
      - "[ci skip]"
      - "[skip review]"

  # 빌드 산출물, 생성 코드, 문서 제외
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.turbo/**"
    - "!**/storybook-static/**"
    - "!**/*.gen.ts"
    - "!**/routeTree.gen.ts"
    - "!**/pnpm-lock.yaml"
    - "!**/*.lock"
    - "!docs/**"
    - "!**/*.md"
    - "!**/*.mdx"
    - "!**/public/**"
    - "!**/.env.example"
    - "!**/*.svg"

  # Finishing touches (docstring/test 제안)
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  # Pre-merge 품질 게이트
  pre_merge_checks:
    title:
      mode: "warning"
      requirements: "Conventional Commits 형식: type(scope): description"
    description:
      mode: "warning"

  # ============================================
  # 📋 Path Instructions
  # ============================================
  path_instructions:

    # ------------------------------------------
    # 🔍 Global: Readability + Effect Hygiene
    # ------------------------------------------
    - path: "**/*.{ts,tsx}"
      instructions: |
        🔍 Readability:
        - Magic numbers → Named constants
        - 복잡한 조건 → 명명된 변수 (isEligible, canSubmit)
        - 중첩 삼항 금지 → switch/IIFE/early return
        - 동일 패턴이 여러 파일에 반복되면 대표 1곳만 코멘트

        ⚡ useEffect = 외부 시스템 동기화만 (react.dev):
        ✅ 타이머, 구독(WebSocket), 비-React 위젯, 브라우저 API
        ❌ 데이터 페칭 → TanStack Query, 파생 상태 → 렌더 시 계산

        🛡️ TypeScript: any 금지, unknown+타입가드, Discriminated Union
        - z.infer<typeof schema>로 Zod 스키마에서 타입 추론. 수동 타입 정의 중복 금지.
        - const assertion(as const)으로 리터럴 타입 좁히기.

        🔒 Security (OWASP):
        - dangerouslySetInnerHTML 사용 시 DOMPurify sanitize 필수.
        - 사용자 입력을 직접 SQL/쿼리에 삽입 금지.
        - 하드코딩된 API 키, 토큰, 비밀번호 감지 시 즉시 지적.
        - eval(), Function(), innerHTML 사용 지적.

        ♿ Accessibility (WCAG 2.1 AA):
        - 네이티브 요소 우선 (<button>), ARIA 보조, 키보드 네비게이션
        - 색상만으로 정보 전달 금지 (색맹 고려).
        - focus-visible 스타일 제거 금지.
        - prefers-reduced-motion으로 애니메이션 비활성화 지원.

        ⚡ React Performance (Vercel Engineering):
        - [CRITICAL] 독립 비동기 작업은 Promise.all()로 병렬 실행. 순차 await 체인 지적.
        - [CRITICAL] barrel file(index.ts) 통한 import 대신 직접 파일 import 권장.
        - [CRITICAL] 무거운 컴포넌트(차트, 에디터, 모달)는 dynamic import으로 코드 스플릿.
        - [MEDIUM] setState(prev => ...) 패턴으로 안정적 콜백 유지.
        - [LOW] 반복 탐색은 Array.includes 대신 Set/Map 사용 (O(1)).

    # ------------------------------------------
    # 🎨 Vanilla Extract (.css.ts)
    # ------------------------------------------
    - path: "**/*.css.ts"
      instructions: |
        🎨 Vanilla Extract:
        - 디자인 토큰: palette(design-system), tokens.ts(fsd/shared/styles) 활용
        - 하드코딩 rgba/hex 금지 → 공유 토큰 import
          import { border, primaryRing, hoverBg } from '@/fsd/shared/styles/tokens';
        - transition은 반드시 base 스타일에 (hover-out 애니메이션 보장)
        - Recipes로 variant, camelCase 네이밍
        - 인라인 스타일 금지

    # ------------------------------------------
    # 🎯 Hooks: TanStack Query v5
    # ------------------------------------------
    - path: "**/{hooks,api,model}/**/*.{ts,tsx}"
      instructions: |
        🎯 TanStack Query v5 + TkDodo:
        - Query hooks → 전체 QueryResult<T, Error> 반환 (data만 꺼내지 말 것)
        - queryKey에 모든 파라미터 포함
        - queryOptions() 헬퍼로 옵션 공통화
        - enabled로 조건부 쿼리
        - 낙관적 업데이트: onMutate→onError→onSettled 3단계
        - gcTime (v5, cacheTime 아님)

    # ------------------------------------------
    # 🧩 FSD: Web App
    # ------------------------------------------
    - path: "apps/web/src/features/**/*.{ts,tsx}"
      instructions: |
        🧩 FSD features (비즈니스 로직):
        - api/: TanStack Query hooks, model/: 비즈니스 hooks, ui/: 컴포넌트
        - 단방향: features → entities → shared
        - SRP, Form cohesion

    - path: "apps/web/src/entities/**/*.{ts,tsx}"
      instructions: |
        🧩 FSD entities (순수 데이터):
        - api/: Query hooks, ui/: Stateless, model/: 타입/상수
        - ❌ 비즈니스 로직, features 의존, any

    - path: "apps/web/src/shared/**/*.{ts,tsx}"
      instructions: |
        🧩 Shared (범용, 도메인 로직 금지):
        - ui/: Polymorphic 컴포넌트, hooks/: 제네릭, lib/: 순수 함수, api/: tRPC

    - path: "apps/web/src/views/**/*.{ts,tsx}"
      instructions: |
        🎭 Views: Composition으로 features 조합. ❌ 비즈니스 로직/데이터 페칭. ✅ 레이아웃, SEO만.

    - path: "apps/web/src/widgets/**/*.{ts,tsx}"
      instructions: |
        🎭 Widgets: 독립 UI 블록 (Header, Sidebar). features 조합 가능, 자체 상태 가능.

    # ------------------------------------------
    # 📱 FSD: Admin App
    # ------------------------------------------
    - path: "apps/admin/src/features/**/*.{ts,tsx}"
      instructions: |
        📱 Admin FSD features:
        - CRUD: TanStack Table + 필터/정렬/페이지네이션
        - 폼: React Hook Form + Zod
        - 삭제: 확인 Dialog (useConfirmDialog) + 낙관적 업데이트
        - columnHelper로 타입 안전
        - 공유 토큰: @/fsd/shared/styles/tokens 사용 필수
        - 단방향: features → entities → shared

    - path: "apps/admin/src/entities/**/*.{ts,tsx}"
      instructions: |
        📱 Admin entities: 순수 데이터 레이어. ❌ 비즈니스 로직, features 의존.

    - path: "apps/admin/src/shared/**/*.{ts,tsx}"
      instructions: |
        📱 Admin shared:
        - ui/: Table, FilterBar, BulkActionBar, EmptyState, CategoryManager
        - styles/tokens.ts: 공유 디자인 토큰 (border, primaryRing, hoverBg 등)
        - styles/layout.ts: SIDEBAR_WIDTH 등 레이아웃 상수
        - lib/: useBulkSelection, useConfirmDialog 등 공유 hooks
        - ❌ 도메인 로직

    - path: "apps/admin/src/views/**/*.{ts,tsx}"
      instructions: |
        📱 Admin views: 페이지 조합. ❌ 비즈니스 로직. ✅ 레이아웃만.

    - path: "apps/admin/src/widgets/**/*.{ts,tsx}"
      instructions: |
        📱 Admin widgets: Layout, Header, Sidebar, Dashboard, Analytics.

    # ------------------------------------------
    # 🔗 Coupling (전체 앱)
    # ------------------------------------------
    - path: "apps/*/src/**/*.{ts,tsx}"
      instructions: |
        🔗 Low Coupling:
        - Props drilling 금지 → Composition
        - 조기 추상화 방지 (3개 이상 패턴일 때만)
        - 상태 관리 범위 좁게 (useCardIdParam > useGlobalState)

    # ------------------------------------------
    # 📦 Design System
    # ------------------------------------------
    - path: "packages/design-system/**/*.{ts,tsx}"
      instructions: |
        📦 Design System:
        - Polymorphic (as prop), Compound Pattern
        - 접근성 필수, 'use client' directive
        - Storybook 문서화

    # ------------------------------------------
    # 🔐 Backend
    # ------------------------------------------
    - path: "apps/server/**/*.ts"
      instructions: |
        🔐 tRPC + Zod:
        - Zod 입력 검증 필수, TRPCError 에러 처리
        - 트랜잭션 (여러 DB 작업 시)
        - 에러 메시지에 민감 정보 노출 금지

    # ------------------------------------------
    # 🔄 Shared Packages
    # ------------------------------------------
    - path: "packages/shared/**/*.ts"
      instructions: |
        🔄 Shared: types/(Result<T>, Discriminated Union), Zod 스키마, 순수 함수. ❌ any

    # ------------------------------------------
    # 🧪 Testing
    # ------------------------------------------
    - path: "**/*.test.{ts,tsx}"
      instructions: |
        🧪 Unit Test: 설명적 테스트명, AAA 패턴 (Arrange/Act/Assert), Edge case, Mock 최소화

    - path: "**/*.spec.{ts,tsx}"
      instructions: |
        🧪 E2E: 사용자 관점, Accessibility, waitFor 네트워크 대기

    # ------------------------------------------
    # 🔧 GitHub Actions
    # ------------------------------------------
    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions:
        - 액션 버전은 커밋 SHA로 고정 (supply chain 공격 방지).
        - secrets는 ${{ secrets.* }}로만 접근. 로그에 노출 금지.
        - permissions: 최소 권한 원칙. contents: read 기본.
        - 캐싱: actions/cache 또는 setup-node cache: pnpm 사용.

    # ------------------------------------------
    # 📦 Storybook
    # ------------------------------------------
    - path: "**/*.stories.{ts,tsx}"
      instructions: |
        Storybook (CSF 3.0):
        - satisfies Meta<typeof Component>로 타입 안전.
        - args로 props 전달. play 함수로 인터랙션 테스트.
        - 접근성 addon 활용.

  # ============================================
  # 🛠️ Tools
  # ============================================
  tools:
    biome:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    markdownlint:
      enabled: true
    eslint:
      enabled: false
    ruff:
      enabled: false
    hadolint:
      enabled: false

# ============================================
# 📚 Knowledge Base
# ============================================
knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/rules/*.md"
      - "**/.cursorrules"
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"

# ============================================
# 💬 Chat
# ============================================
chat:
  auto_reply: true
